name: Deploy Automático

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Atualizar Servidor Oracle via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            # Acesse a pasta onde o bot está instalado no seu servidor
            # Verifique se o caminho abaixo está correto ou ajuste conforme necessário
            cd ~/shopee-telegram-bot
            
            # Sincroniza o código com o GitHub
            git pull origin main
            
            # Atualiza as bibliotecas se houver mudanças no requirements.txt
            source venv/bin/activate
            pip install -r requirements.txt
            
            # Reinicia o serviço automaticamente para aplicar as mudanças
            # Certifique-se de que o nome do serviço (.service) é este mesmo
            sudo systemctl restart bot_telegram.service

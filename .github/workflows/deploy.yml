name: Deploy Automatico

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Atualizar Servidor Oracle via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            # Acessa a pasta exata onde o bot está no servidor
            cd ~/shopee
            
            # Sincroniza o código com o GitHub forçando a cópia exata
            git fetch --all
            git reset --hard origin/main
            
            # Atualiza as bibliotecas se houver mudanças
            source venv/bin/activate
            pip install -r requirements.txt
            
            # Reinicia o serviço principal (shopee) com tolerância a falhas de parada
            sudo systemctl stop shopee_bot.service || true
            sudo systemctl kill -s SIGKILL shopee_bot.service || true
            sudo systemctl start shopee_bot.service
            
            EXIBIR_LOGS="true"
            
            # Reinicia o Userbot de divulgação com limpeza rigorosa de processos zumbis
            if [ "$EXIBIR_LOGS" = "true" ]; then echo "🚀 Parando o serviço atual..."; fi
            sudo systemctl stop divulgacao_bot.service || true
            if [ "$EXIBIR_LOGS" = "true" ]; then echo "🧹 Aniquilando processos residuais na memória..."; fi
            sudo systemctl kill -s SIGKILL divulgacao_bot.service || true
            if [ "$EXIBIR_LOGS" = "true" ]; then echo "✅ Iniciando a nova versão limpa do Userbot..."; fi
            sudo systemctl start divulgacao_bot.service

            # Reinicia o Módulo Espião de Clonagem
            if [ "$EXIBIR_LOGS" = "true" ]; then echo "🕵️ Parando o Módulo Espião..."; fi
            sudo systemctl stop espiao_bot.service || true
            if [ "$EXIBIR_LOGS" = "true" ]; then echo "🧹 Limpando processos da escuta..."; fi
            sudo systemctl kill -s SIGKILL espiao_bot.service || true
            if [ "$EXIBIR_LOGS" = "true" ]; then echo "✅ Iniciando a nova versão do Espião..."; fi
            sudo systemctl start espiao_bot.service

            # Reinicia o Espelhador de Vídeos Autorais
            if [ "$EXIBIR_LOGS" = "true" ]; then echo "🔄 Parando o Espelhador Autorais..."; fi
            sudo systemctl stop espelhador_autorais_bot.service || true
            if [ "$EXIBIR_LOGS" = "true" ]; then echo "🧹 Limpando processos do Espelhador..."; fi
            sudo systemctl kill -s SIGKILL espelhador_autorais_bot.service || true
            if [ "$EXIBIR_LOGS" = "true" ]; then echo "✅ Iniciando a nova versão do Espelhador..."; fi
            sudo systemctl start espelhador_autorais_bot.service

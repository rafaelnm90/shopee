name: Deploy Automatico

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Atualizar Servidor Oracle via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            # Acessa a pasta exata onde o bot está no servidor
            cd ~/shopee
            
            # Sincroniza o código com o GitHub forçando a cópia exata
            git fetch --all
            git reset --hard origin/main
            
            # Atualiza as bibliotecas se houver mudanças
            source venv/bin/activate
            pip install -r requirements.txt --no-cache-dir
            
            # Recarrega as configurações do sistema caso algum .service tenha sido alterado no GitHub
            sudo systemctl daemon-reload
            
            EXIBIR_LOGS="true"
            
            # 1. Reinicia o serviço principal (Shopee)
            if [ "$EXIBIR_LOGS" = "true" ]; then echo "🚀 Reiniciando Bot Shopee Principal..."; fi
            sudo systemctl stop shopee_bot.service || true
            sudo systemctl kill -s SIGKILL shopee_bot.service || true
            sudo systemctl start shopee_bot.service
            
            # 2. Reinicia o Userbot de Divulgação
            if [ "$EXIBIR_LOGS" = "true" ]; then echo "🚀 Reiniciando Userbot de Divulgação..."; fi
            sudo systemctl stop divulgacao_bot.service || true
            sudo systemctl kill -s SIGKILL divulgacao_bot.service || true
            sudo systemctl start divulgacao_bot.service

            # 3. Reinicia o Módulo Espião
            if [ "$EXIBIR_LOGS" = "true" ]; then echo "🕵️ Reiniciando Módulo Espião..."; fi
            sudo systemctl stop espiao_bot.service || true
            sudo systemctl kill -s SIGKILL espiao_bot.service || true
            sudo systemctl start espiao_bot.service

            # 4. Reinicia o Espelhador de Vídeos Autorais
            if [ "$EXIBIR_LOGS" = "true" ]; then echo "🔄 Reiniciando Espelhador Autorais..."; fi
            sudo systemctl stop espelhador_autorais_bot.service || true
            sudo systemctl kill -s SIGKILL espelhador_autorais_bot.service || true
            sudo systemctl start espelhador_autorais_bot.service
            
            if [ "$EXIBIR_LOGS" = "true" ]; then echo "🚪 Encerrando a conexão SSH de forma limpa..."; fi
            exit 0

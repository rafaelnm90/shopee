name: Deploy Automatico

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Atualizar Servidor Oracle via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            # Acessa a pasta exata onde o bot está no servidor
            cd ~/shopee
            
            # Sincroniza o código com o GitHub
            git pull origin main
            
            # Atualiza as bibliotecas se houver mudanças
            source venv/bin/activate
            pip install -r requirements.txt
            
            # Reinicia o serviço usando o nome correto
            sudo systemctl restart shopee_bot.service
            
            EXIBIR_LOGS=true
            
            # Reinicia o Userbot de divulgação com limpeza rigorosa de processos zumbis
            if [ "$EXIBIR_LOGS" = true ]; then echo "🚀 Parando o serviço atual..."; fi
            sudo systemctl stop divulgacao_bot.service
            if [ "$EXIBIR_LOGS" = true ]; then echo "🧹 Aniquilando processos residuais na memória..."; fi
            sudo pkill -9 -f divulgacao_canal.py || true
            if [ "$EXIBIR_LOGS" = true ]; then echo "✅ Iniciando a nova versão limpa do Userbot..."; fi
            sudo systemctl start divulgacao_bot.service
